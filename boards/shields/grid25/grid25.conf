# Uncomment to enable the encoder
# CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Uncomment to enable the display
# CONFIG_ZMK_DISPLAY=y



CONFIG_ZMK_BLE=y
CONFIG_BT=y
# CONFIG_ZMK_USB=


# 启用日志打印
# CONFIG_ZMK_USB_LOGGING=y



## RGB 灯效配置
# 启用RGB灯效
CONFIG_ZMK_RGB_UNDERGLOW=y

# 启用 LED 灯带驱动总开关
CONFIG_LED_STRIP=y

# 空闲时自动关闭灯光
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y

# 默认关闭灯光
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=n

# 默认灯光亮度%
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=10

# 最大灯光亮度%
CONFIG_ZMK_RGB_UNDERGLOW_BRT_MAX=100

# 亮度调整步长%
CONFIG_ZMK_RGB_UNDERGLOW_BRT_STEP=10

# 灯光关闭时关闭ext_vcc
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n

# 启用 SPI 模拟 WS2812 的具体驱动
CONFIG_WS2812_STRIP=y

# 确保 SPI 驱动已开启
CONFIG_SPI=y

#外部VCC控制
CONFIG_ZMK_EXT_POWER=y

#浅睡眠
CONFIG_ZMK_IDLE_TIMEOUT=10000

# 深度睡眠
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=30000

# 默认解锁 zmk studio
CONFIG_ZMK_STUDIO_LOCKING=n
